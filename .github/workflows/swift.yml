name: swift build + test

on:
  push:
    branches: [main, 'pivot/**', 'feat/**', 'fix/**']
    paths:
      - 'pkim-binary/**'
      - '.github/workflows/swift.yml'
  pull_request:
    paths:
      - 'pkim-binary/**'
      - '.github/workflows/swift.yml'

jobs:
  build-test:
    name: build + unit tests
    runs-on: macos-15
    defaults:
      run:
        working-directory: pkim-binary
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (debug)
        run: swift build

      - name: Test (unit + offline cache, excluding live DT)
        # PKIM_BRIDGE_LIVE is intentionally unset — the live SB and live
        # cache suites need a running DEVONthink instance and a real
        # ~/Library/Metadata/com.devon-technologies.think tree, which CI
        # doesn't have. They self-skip when the env var is absent.
        run: swift test
